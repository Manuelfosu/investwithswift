  // Never show a blank page: surface load/runtime failures to the user.
  function swiftShowError(msg, detail){
    var r = document.getElementById('root'); if(!r) return;
    r.innerHTML = '<div style="max-width:560px;margin:48px auto;font-family:Inter,system-ui,sans-serif;padding:28px;border:1px solid #fee2e2;background:#fff;border-radius:16px;color:#0A2540;box-shadow:0 1px 3px rgba(10,37,64,.08)">'

      + '<p style="color:#94a3b8;font-size:12px;margin-top:12px">This preview loads React, Tailwind and Chart.js from a CDN, so it needs internet access. Reload once you are online.</p></div>';
  }
  window.addEventListener('error', function(e){ if(document.getElementById('boot')) swiftShowError('Something failed to load', (e && e.message) || 'Script error'); });
  setTimeout(function(){
    if(!document.getElementById('boot')) return;
    var missing = [];
    if(!window.React) missing.push('React');
    if(!window.ReactDOM) missing.push('ReactDOM');
    if(!window.Babel) missing.push('Babel');
    if(!window.Chart) missing.push('Chart.js');
    if(missing.length) swiftShowError('Could not load required libraries', 'Missing: ' + missing.join(', ') + '.');
  }, 7000);
</script>

function delay(data, ms){ return new Promise(function(res){ setTimeout(function(){ res(data); }, ms||300); }); }

/* =========================================================================
   WHERE IS THE BACKEND?  (read this if you deploy)
   -------------------------------------------------------------------------
   • Leave BACKEND_URL = '' to (a) use the live database when this file is
     served by your own backend (http://localhost:4000), or (b) run as a
     self-contained DEMO with built-in data when hosted on GitHub Pages or
     opened directly from disk.
   • Once you host the backend on a free server (e.g. Render), paste its URL
     here, e.g.  const BACKEND_URL = 'https://swift-api.onrender.com';
     Then the GitHub Pages site will use your REAL database.
========================================================================= */
const BACKEND_URL = ''; // <<< paste your hosted backend URL here to go fully live
const API_BASE =
  BACKEND_URL ? (BACKEND_URL.replace(/\/$/, '') + '/api')
  : ((location.protocol === 'http:' || location.protocol === 'https:') ? '/api' : null);

/* DEMO_MODE = true when no live backend is reachable. Lets the Admin console
   render with sample data in the preview / on static hosting. It flips on
   after any offline or failed request. */
let DEMO_MODE = !API_BASE;

/* Called whenever the backend reports an expired/invalid session (HTTP 401).
   AppProvider registers the real handler, which signs the user out and routes
   them to the login screen. */
let unauthorizedHandler = null;
function onUnauthorized(){ if(typeof unauthorizedHandler === 'function') unauthorizedHandler(); }

async function apiGet(path, fallback){
  if(!API_BASE){ DEMO_MODE = true; return delay(fallback); }
  let r;
  try{
    r = await fetch(API_BASE + path, { credentials:'include' });
  }catch(err){ DEMO_MODE = true; console.warn('[api] offline — using demo data for', path); return delay(fallback); }
  if(r.status === 401){ onUnauthorized(); const e = new Error('Your session has expired. Please log in again.'); e.handled = true; e.unauthorized = true; throw e; }
  if(!r.ok){ DEMO_MODE = true; console.warn('[api] backend unavailable — using demo data for', path); return delay(fallback); }
  return await r.json();
}
async function apiPost(path, body, fallback){
  if(!API_BASE){ DEMO_MODE = true; return delay(fallback); }
  let r;
  try{
    r = await fetch(API_BASE + path, { method:'POST', headers:{ 'Content-Type':'application/json' }, credentials:'include', body: JSON.stringify(body||{}) });
  }catch(err){
    // Genuine network/offline failure — fall back to demo behaviour.
    DEMO_MODE = true; console.warn('[api] offline — using demo response for', path); return delay(fallback);
  }
  // Expired/invalid session on a protected action: sign out and redirect.
  if(r.status === 401 && path.indexOf('/auth/') !== 0){ onUnauthorized(); const e = new Error('Your session has expired. Please log in again.'); e.handled = true; e.unauthorized = true; throw e; }
  if(!r.ok){
    // A reachable backend returns JSON { error } for real validation problems
    // (bad credentials, min withdrawal, insufficient balance, etc). If there is
    // no JSON error the backend simply isn't there (e.g. static hosting) — fall
    // back to demo behaviour so the preview still works.
    const e = await r.json().catch(function(){ return null; });
    if(e && e.error){ const err = new Error(e.error); err.handled = true; throw err; }
    DEMO_MODE = true; console.warn('[api] backend unavailable — using demo response for', path); return delay(fallback);
  }
  return await r.json();
}

/* One-shot session probe used at startup to decide where to send the user:
   'authed' (valid session), 'guest' (no/expired session), or 'offline'
   (no backend reachable — preview/demo). Never triggers a redirect itself. */
async function probeSession(){
  if(!API_BASE){ DEMO_MODE = true; return { state:'offline' }; }
  let r;
  try{ r = await fetch(API_BASE + '/me', { credentials:'include' }); }
  catch(e){ DEMO_MODE = true; return { state:'offline' }; }
  if(r.status === 401) return { state:'guest' };
  if(!r.ok){ DEMO_MODE = true; return { state:'offline' }; }
  try{ const u = await r.json(); return (u && u.email) ? { state:'authed', user:u } : { state:'guest' }; }
  catch(e){ return { state:'guest' }; }
}

const AppCtx = createContext(null);
const useApp = ()=> useContext(AppCtx);
function AppProvider({ children }){
  const [authed,setAuthed] = useState(false);
  const [authReady,setAuthReady] = useState(false);          // true once the session probe resolves
  const [currentUser,setCurrentUser] = useState(null);        // the signed-in user's profile
  const [dark,setDark]     = useState(false);
  const [depositAmount,setDepositAmount] = useState(DEPOSIT_AMOUNTS[0]);
  const [depositName,setDepositName] = useState('');
  const [depositMomo,setDepositMomo] = useState('');
  const [toast,setToast] = useState(null);                    // { id, msg, tone }
  function showToast(msg, tone){ setToast({ id:Date.now(), msg:msg, tone:tone||'success' }); }
  useEffect(function(){ document.documentElement.classList.toggle('dark', dark); }, [dark]);
  useEffect(function(){ if(!toast) return; const t = setTimeout(function(){ setToast(null); }, 3200); return function(){ clearTimeout(t); }; }, [toast]);

  // Decide the initial auth state from the backend session (or demo when offline).
  useEffect(function(){
    let alive = true;
    probeSession().then(function(res){
      if(!alive) return;
      if(res.state === 'authed'){ setAuthed(true); setCurrentUser(res.user); }
      setAuthReady(true);
    });
    return function(){ alive = false; };
  }, []);

  // When any request hits a 401, sign out and bounce to the login screen.
  useEffect(function(){

/* Chart.js wrapper */
function ChartCanvas({ type, data, options, height=200 }){
  const ref = useRef(null); const inst = useRef(null);
  const [failed, setFailed] = useState(false);
  useEffect(function(){
    if(!ref.current) return;
    if(!ChartJS || !data){ setFailed(true); return; }
    try {
      inst.current = new ChartJS(ref.current, { type:type, data:data, options:options });
      setFailed(false);
    } catch(e){ console.warn('[chart] render failed:', e); setFailed(true); }
    return ()=>{ if(inst.current){ try{ inst.current.destroy(); }catch(e){} inst.current = null; } };
  }, [JSON.stringify(data), type]);
  const box = { height: height + 'px' };
  if(failed) return <div style={box} className="grid place-items-center text-xs text-slate-400 border border-dashed border-slate-200 dark:border-white/10 rounded-xl">Chart unavailable</div>;
  return <div style={box}><canvas ref={ref}/></div>;
}

function Login(){
  const { setAuthed, setCurrentUser } = useApp();
  const [loading,setLoading]=useState(false);
  const [email,setEmail]=useState(''); const [password,setPassword]=useState(''); const [error,setError]=useState('');
  const submit=(e)=>{ e.preventDefault(); setError('');
    if(!email.trim() || !password){ setError('Please enter your email and password.'); return; }
    setLoading(true);
    api.login({ email:email.trim(), password:password }).then(function(res){ setAuthed(true); if(res && res.user) setCurrentUser(res.user); go('/dashboard'); }).catch(function(){ setLoading(false); setError('Username or password is invalid. Please try again.'); }); };
  const forgot=(e)=>{ e.preventDefault(); alert('Passwords cannot be recovered. For your security they are stored only as a one-way encrypted hash, so no one (not even an administrator) can ever see or retrieve your existing password. An admin can reset it for you, or you can create a new account. Demo login: demo@swift.io / demo1234.'); };
  return (
    <AuthLayout title="Welcome back" subtitle="Log in to access your portfolio." foot={<>New to Swift? <a href="#/register" className="text-brand font-semibold">Create an account</a></>}>
      <form onSubmit={submit} className="space-y-4">

        <Field label="Phone or email" placeholder="Enter your phone or email" value={email} onChange={(e)=>setEmail(e.target.value)}/>
        <Field label="Password" type="password" placeholder="Enter your password" value={password} onChange={(e)=>setPassword(e.target.value)}/>
        <div className="flex items-center justify-between text-sm">
          <label className="flex items-center gap-2 text-slate-500"><input type="checkbox" className="rounded"/> Remember me</label>
          <a href="#" onClick={forgot} className="text-brand font-medium">Forgot password?</a>
        </div>
        <p className="text-xs text-slate-400 dark:text-slate-500 -mt-1">Passwords cannot be recovered — they are encrypted with a one-way hash. An admin can only reset yours, never view it.</p>
        <Button size="lg" disabled={loading}>{loading?'Signing in…':'Log in'}</Button>

function Register(){
  const { setAuthed, setCurrentUser } = useApp();
  const [loading,setLoading]=useState(false);
  const [name,setName]=useState(''); const [email,setEmail]=useState(''); const [phone,setPhone]=useState(''); const [password,setPassword]=useState(''); const [agree,setAgree]=useState(false);
  const [ref,setRef]=useState(getRefParam()); const [error,setError]=useState('');
  const submit=(e)=>{ e.preventDefault(); setError('');
    if(!name.trim()){ setError('Please enter your full name.'); return; }
    if(!isEmail(email)){ setError('Please enter a valid email address.'); return; }
    if(password.length < 6){ setError('Your password must be at least 6 characters.'); return; }
    if(!agree){ setError('Please accept the Terms of Service to continue.'); return; }
    setLoading(true);
    api.register({ name:name.trim(), email:email.trim(), phone:phone.trim(), password:password, ref:ref.trim() }).then(function(res){ setAuthed(true); if(res && res.user) setCurrentUser(res.user); go('/dashboard'); }).catch(function(err){ setLoading(false); setError((err && err.message) ? err.message : 'We could not create your account. Please try again.'); }); };
  return (
    <AuthLayout title="Create account" subtitle="Start investing in under 2 minutes." foot={<>Already have an account? <a href="#/login" className="text-brand font-semibold">Log in</a></>}>
      <form onSubmit={submit} className="space-y-4">

        <Field label="Full name" placeholder="Enter your full name" value={name} onChange={(e)=>setName(e.target.value)}/>
        <Field label="Email" type="email" placeholder="Enter your email address" value={email} onChange={(e)=>setEmail(e.target.value)}/>
        <Field label="Phone number" placeholder="Enter your phone number" value={phone} onChange={(e)=>setPhone(e.target.value)}/>
        <Field label="Password" type="password" placeholder="Create a password (min 6 chars)" value={password} onChange={(e)=>setPassword(e.target.value)}/>
        <Field label="Referral code (optional)" placeholder="Enter referral code (optional)" value={ref} onChange={(e)=>setRef(e.target.value)} hint={ref?'A friend invited you — you both get rewarded when you fund your account.':''}/>
        <label className="flex items-start gap-2 text-xs text-slate-500"><input type="checkbox" checked={agree} onChange={(e)=>setAgree(e.target.checked)} className="mt-0.5 rounded"/> I agree to the Terms of Service and Privacy Policy.</label>

      </form>
    </AuthLayout>
  );
}

function Plans(){

  function loadSum(){ api.getSummary().then(setSum).catch(function(){ setSum(MOCK); }); }
  useEffect(loadSum, []);
  const avail = sum ? (sum.available||0) : 0;
  const subscribe=()=>{
    // Rule: you can only activate a plan when your available balance covers its full price.
    if(modal.price > avail){ window.alert('⚠️ Insufficient balance. You need ' + cedi0(modal.price) + ' available to activate ' + modal.name + '. Your available balance is ' + cedi0(avail) + '.'); return; }
    var ok = window.confirm('Subscribe to ' + modal.name + '?\n\nPrice: ' + cedi0(modal.price) + '\nDaily income: ' + cedi0(modal.daily) + '\nDuration: ' + modal.days + ' days\nTotal return: ' + cedi0(modal.daily*modal.days));
    if(!ok) return;
    setBusy(true);
    api.subscribePlan(modal).then(function(r){ setBusy(false); setDone(true); if(r && r.summary) setSum(r.summary); else loadSum(); window.alert('✅ Success! You are now subscribed to ' + modal.name + '. ' + cedi0(modal.price) + ' was deducted from your balance and your first daily income of ' + cedi0(modal.daily) + ' has been credited today.'); }).catch(function(err){ setBusy(false); setModal(null); window.alert('⚠️ ' + (err && err.message ? err.message : 'Could not subscribe to this plan.')); });
  };
  return (
    <div className="space-y-4">
      <div>
        <h2 className="text-xl font-extrabold text-navy-700 dark:text-white">Investment plans</h2>
        <p className="text-sm text-slate-500 dark:text-slate-400">Choose a VIP plan and earn daily income for {PLANS[0].days} days.</p>

      <div className="grid grid-cols-2 gap-3">
        {PLANS.map(function(p){
          return (
            <div key={p.name}>
              <PlanCardInteractive plan={p} avail={avail} onInvest={()=>{ setDone(false); setModal(p); }}/>
            </div>
          );
        })}
      </div>
      <Card className="p-4 text-sm text-slate-500 dark:text-slate-400">
        💡 Daily income is credited automatically each day for the validity period. Make sure your wallet is funded before investing.
      </Card>
      <Modal open={!!modal} onClose={()=>setModal(null)} title={done?'Subscribed!':('Confirm ' + (modal?modal.name:''))}>
        {modal && !done && (
          <div>
            <div className="space-y-1.5 text-sm">
              <div className="flex justify-between"><span className="text-slate-500">Plan</span><span className="font-bold">{modal.name}</span></div>
              <div className="flex justify-between"><span className="text-slate-500">Price</span><span className="font-bold">{cedi0(modal.price)}</span></div>
              <div className="flex justify-between"><span className="text-slate-500">Daily income</span><span className="font-bold text-profit">{cedi0(modal.daily)}</span></div>
              <div className="flex justify-between"><span className="text-slate-500">Total return</span><span className="font-bold">{cedi0(modal.daily*modal.days)}</span></div>
              <div className="flex justify-between pt-1.5 border-t border-slate-100 dark:border-white/10"><span className="text-slate-500">Your available</span><span className={cx('font-bold', modal.price>avail?'text-loss':'text-profit')}>{cedi0(avail)}</span></div>

/* ---------- Deposit (amount selection) ---------- */
function Deposit(){
  const { depositAmount, setDepositAmount, depositName, setDepositName, depositMomo, setDepositMomo } = useApp();
  const [custom,setCustom]=useState('');
  const choose=(v)=>{ setDepositAmount(v); setCustom(''); };
  const amount = custom ? Number(custom) : depositAmount;
  // useful JS prompt: enter a custom amount with a native prompt + validation
  const promptCustom=()=>{
    var v = window.prompt('Enter a custom deposit amount (₵):', custom || '');
    if(v===null) return;
    var n = Number(v);
    if(!n || n<=0){ window.alert('⚠️ Please enter a valid amount greater than 0.'); return; }
    setCustom(String(n)); setDepositAmount(0);
  };
  const proceed=()=>{
    // Require the payer's full name, MoMo number and amount before continuing.
    if(!depositName.trim()){ window.alert('⚠️ Please enter your full name (as registered on your Mobile Money account).'); return; }

    if(!amount || amount<=0){ window.alert('⚠️ Please select or enter an amount first.'); return; }
    var ok = window.confirm('Proceed to pay ' + cedi0(amount) + ' via Telecel Cash as ' + depositName.trim() + ' (' + depositMomo.replace(/\s+/g,'') + ')?');
    if(!ok) return;
    setDepositName(depositName.trim()); setDepositMomo(depositMomo.replace(/\s+/g,'')); setDepositAmount(amount); go('/payment');

    <div className="space-y-5">

        {DEPOSIT_AMOUNTS.map(function(v){
          const active = !custom && depositAmount===v;
          return (
            <button key={v} onClick={()=>choose(v)} className={cx('rounded-2xl py-5 font-extrabold text-lg border-2 transition-all', active?'border-brand bg-brand/10 text-brand':'border-slate-200 dark:border-white/10 bg-white dark:bg-navy-800 text-navy-700 dark:text-white hover:border-brand/50')}>{cedi0(v)}</button>
          );
        })}
      </div>
      <Card className="p-4">
        <label className="text-sm font-medium text-navy-700 dark:text-slate-200">Or enter a custom amount</label>
        <div className="mt-1 relative">
          <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₵</span>
          <input value={custom} onChange={(e)=>setCustom(e.target.value)} type="number" placeholder="0.00" className="w-full rounded-xl border border-slate-300 dark:border-white/15 bg-white dark:bg-navy-900 pl-8 pr-3 py-3 text-sm focus:ring-2 focus:ring-brand/40 focus:border-brand outline-none"/>
        </div>
        <button onClick={promptCustom} className="mt-2 text-sm font-semibold text-brand inline-flex items-center gap-1">✏️ Enter amount with keypad</button>
      </Card>
      <div className="rounded-2xl bg-navy-50 dark:bg-white/5 p-4 flex items-center justify-between">
        <span className="text-sm text-slate-500 dark:text-slate-400">You will pay</span>
        <span className="text-2xl font-extrabold text-navy-700 dark:text-white">{cedi0(amount||0)}</span>

          <li>Tap <strong>Pay Now!</strong> to see the payment instructions.</li>
          <li>Send the exact amount to the Telecel Cash number shown.</li>

        </ol>

/* ---------- Withdraw ---------- */
function Withdraw(){
  const MIN_WD = 100;       // minimum withdrawal in cedis
  const REQ_REFS = 2;       // successful referrals required to unlock withdrawals
  const [sum,setSum]=useState(null);
  const [refData,setRefData]=useState(null);
  const [acct,setAcct]=useState('');
  const [num,setNum]=useState('');
  const [amt,setAmt]=useState('');
  const [modal,setModal]=useState(false);
  const [busy,setBusy]=useState(false);
  useEffect(function(){
    api.getSummary().then(setSum).catch(function(){ setSum(MOCK); });
    api.getReferral().then(setRefData).catch(function(){ setRefData(MOCK_REFERRAL); });
  }, []);
  const available = sum ? (sum.available||0) : 0;
  // A 'successful' referral is one who has funded their account (status active).
  const successful = refData ? (refData.referrals||[]).filter(function(r){ return r.status==='active'; }).length : 0;
  const eligible = successful >= REQ_REFS;
  const submit=(e)=>{
    e.preventDefault();
    var n = Number(amt);
    if(!n || n<=0){ window.alert('⚠️ Enter a valid withdrawal amount.'); return; }
    if(n < MIN_WD){ window.alert('⚠️ The minimum withdrawal is ' + cedi0(MIN_WD) + '.'); return; }
    if(!eligible){ window.alert('🔒 You need at least ' + REQ_REFS + ' successful referrals to withdraw. You currently have ' + successful + '. Invite friends from the Referrals tab.'); return; }
    if(n > available){ window.alert('⚠️ Amount exceeds your available balance of ' + cedi(available) + '.'); return; }
    var ok = window.confirm('Withdraw ' + cedi(n) + ' to ' + (acct||'your account') + ' (' + (num||'—') + ')?');
    if(!ok) return;
    setModal(true);
  };
  const confirmWithdraw=()=>{
    setBusy(true);
    api.withdraw({ amount:Number(amt), account:acct, number:num }).then(function(){
      setBusy(false); setModal(false);
      window.alert('✅ Withdrawal request submitted. An admin will review and release your funds shortly.');
      go('/dashboard');
    }).catch(function(err){
      setBusy(false); setModal(false);
      window.alert('⚠️ ' + (err && err.message ? err.message : 'Withdrawal failed. Please try again.'));
    });
  };
  return (
    <div className="space-y-4">
      {/* balance on top */}
      <div className="rounded-3xl bg-gradient-to-br from-navy-700 to-brand text-white p-5 shadow-pop">
        <p className="text-sm text-slate-200">Available balance</p>
        <p className="text-3xl font-extrabold mt-1">{sum?cedi(available):'…'}</p>
        <p className="text-xs text-slate-300 mt-1">Withdrawable now</p>
      </div>
      <h2 className="text-xl font-extrabold text-navy-700 dark:text-white">Withdraw funds</h2>
      {/* eligibility banner */}
      <Card className={cx('p-4 flex items-center gap-3 border-l-4', eligible?'border-profit':'border-gold')}>
        <span className={cx('w-9 h-9 rounded-xl grid place-items-center shrink-0', eligible?'bg-profit-soft text-profit':'bg-gold-soft text-amber-600')}><Icon d={eligible?'M20 6L9 17l-5-5':'M12 9v4m0 4h.01M10.3 3.9l-8 14A2 2 0 004 21h16a2 2 0 001.7-3l-8-14a2 2 0 00-3.4 0z'} className="w-5 h-5"/></span>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-navy-700 dark:text-white">{eligible?'You are eligible to withdraw':'Withdrawals locked'}</p>
          <p className="text-xs text-slate-500 dark:text-slate-400">{successful}/{REQ_REFS} successful referrals · minimum {cedi0(MIN_WD)}</p>
        </div>
        {!eligible && <Button size="sm" variant="outline" onClick={()=>go('/referrals')}>Invite</Button>}
      </Card>
      <Card className="p-5">
        <form onSubmit={submit} className="space-y-4">
          <Field label="Withdrawal account" placeholder="Account name (e.g. Emma Highest)" value={acct} onChange={(e)=>setAcct(e.target.value)}/>
          <Field label="Withdrawal number" type="tel" placeholder="e.g. 0541234567" value={num} onChange={(e)=>setNum(e.target.value)}/>
          <label className="block">
            <span className="text-sm font-medium text-navy-700 dark:text-slate-200">Amount</span>
            <div className="mt-1 relative">
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₵</span>
              <input value={amt} onChange={(e)=>setAmt(e.target.value)} type="number" placeholder="Minimum 100.00" className="w-full rounded-xl border border-slate-300 dark:border-white/15 bg-white dark:bg-navy-900 pl-8 pr-3 py-3 text-sm focus:ring-2 focus:ring-brand/40 focus:border-brand outline-none"/>
            </div>
          </label>
          <Button size="lg" variant="danger" disabled={!acct||!num||!amt||!eligible}>{eligible?'Request withdrawal':('Locked — need '+REQ_REFS+' referrals')}</Button>
        </form>
      </Card>
      <Card className="p-4">
        <h4 className="font-bold text-sm text-navy-700 dark:text-white mb-2">Withdrawal instructions</h4>
        <ol className="text-sm text-slate-500 dark:text-slate-400 space-y-1.5 list-decimal pl-4">
          <li>The minimum withdrawal is <strong>{cedi0(MIN_WD)}</strong>.</li>
          <li>You must have at least <strong>{REQ_REFS} successful referrals</strong> (a referral counts once they fund their account).</li>
          <li>Enter the account name and mobile money number to receive funds.</li>
          <li>Withdrawals are reviewed and released by an admin within 24 hours.</li>
          <li>Double-check your number — funds sent to a wrong number cannot be recovered.</li>
        </ol>
      </Card>
      <Modal open={modal} onClose={()=>setModal(false)} title="Confirm withdrawal">
        <div className="space-y-1.5 text-sm">
          <div className="flex justify-between"><span className="text-slate-500">Account</span><span className="font-bold">{acct||'—'}</span></div>
          <div className="flex justify-between"><span className="text-slate-500">Number</span><span className="font-bold">{num||'—'}</span></div>
          <div className="flex justify-between"><span className="text-slate-500">Amount</span><span className="font-bold">{amt?cedi(Number(amt)):'₵0.00'}</span></div>
        </div>
        <p className="text-xs text-slate-400 mt-3">Your request will be held for admin review before funds are released.</p>
        <div className="flex gap-2 mt-5"><Button variant="outline" className="flex-1" onClick={()=>setModal(false)}>Cancel</Button><Button variant="danger" className="flex-1" disabled={busy} onClick={confirmWithdraw}>{busy?'Submitting…':'Confirm'}</Button></div>
      </Modal>
    </div>
  );
}

/* small helpers */
function initials(name){ return (name || '?').slice(0,2).toUpperCase(); }
function fmtDateTime(s){
  if(!s) return '—';
  var iso = String(s).trim().replace(' ','T');
  if(iso.indexOf('Z')<0 && iso.indexOf('+')<0) iso += 'Z';
  var d = new Date(iso);
  return isNaN(d.getTime()) ? String(s) : d.toLocaleString();
}
/* One label/value row used in the admin Registration-details card. Optionally copyable. */
function DRow({ label, value, mono, copy }){
  const [done,setDone] = useState(false);
  function doCopy(){ copyText(String(value==null?'':value)); setDone(true); setTimeout(function(){ setDone(false); }, 1200); }
  return (
    <div className="flex items-center justify-between gap-3 text-sm">
      <span className="text-slate-400 shrink-0">{label}</span>
      <span className="font-medium text-navy-700 dark:text-white text-right flex items-center gap-1.5 min-w-0">
        <span className={cx('truncate', mono && 'font-mono text-xs')}>{value==null||value===''?'—':value}</span>
        {copy && value ? <button onClick={doCopy} title="Copy" className="text-brand hover:text-brand-700 shrink-0">{done ? <Icon d="M5 13l4 4L19 7" className="w-3.5 h-3.5"/> : <Icon d="M9 9h10v12H9zM5 15H3V3h12v2" className="w-3.5 h-3.5"/>}</button> : null}
      </span>
    </div>
  );
}
function StatusPill({ status }){
  const tone = status==='Completed' ? 'profit' : status==='Pending' ? 'amber' : status==='Failed' ? 'loss' : 'slate';
  return <Badge tone={tone}>{status}</Badge>;
}
function RoleBadge({ role }){ return role==='admin' ? <Badge tone="brand">admin</Badge> : <Badge>user</Badge>; }

/* KPI tile — becomes a button when onClick is supplied (links to a section) */
function AdKpi({ label, value, sub, icon, tone='brand', onClick }){
  const tile = tone==='loss' ? 'bg-loss-soft text-loss'
    : tone==='profit' ? 'bg-profit-soft text-profit'
    : tone==='amber' ? 'bg-gold-soft text-amber-600'
    : 'bg-blue-50 text-brand dark:bg-brand/15';
  const inner = (
    <Card className={cx('p-4 h-full', onClick && 'transition-transform active:scale-[0.98] hover:shadow-md')}>
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <p className="text-xs font-medium text-slate-400">{label}</p>
          <p className="text-2xl font-extrabold mt-1 text-navy-700 dark:text-white truncate">{value}</p>
          {sub && <p className="text-xs text-slate-400 mt-0.5">{sub}</p>}
        </div>
        <span className={cx('w-10 h-10 rounded-xl grid place-items-center shrink-0', tile)}><Icon d={icon} className="w-5 h-5"/></span>
      </div>
    </Card>
  );
  return onClick ? <button onClick={onClick} className="text-left w-full">{inner}</button> : inner;
}

/* ---------- responsive list cards (mobile-first) ---------- */

        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2"><p className="font-semibold text-navy-700 dark:text-white truncate">{u.name}</p><RoleBadge role={u.role}/></div>
          <p className="text-xs text-slate-400 truncate">{u.email}</p>
          <p className="text-[11px] text-slate-400 mt-0.5">{u.tier} · Balance {cedi0(u.balance)}</p>

        <Icon d="M9 6l6 6-6 6" className="w-4 h-4 text-slate-300 shrink-0"/>

      <div className="flex gap-2 mt-3">

}
function TxnCard({ t, onUser, onApprove, onReject }){
  const tone = t.type==='Withdrawal' ? 'bg-loss-soft text-loss' : t.type==='Deposit' ? 'bg-blue-50 text-brand dark:bg-brand/15' : 'bg-profit-soft text-profit';
  const tIcon = t.type==='Withdrawal' ? 'M12 5v14M5 12l7 7 7-7' : t.type==='Deposit' ? 'M12 19V5M5 12l7-7 7 7' : 'M3 3v18h18M7 14l3-3 3 3 5-5';
  return (
    <Card className="p-3">
      <div className="flex items-center gap-3">
        <span className={cx('w-9 h-9 rounded-xl grid place-items-center shrink-0', tone)}><Icon d={tIcon} className="w-4 h-4"/></span>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-navy-700 dark:text-white truncate">{t.type} · <span className="font-mono text-xs text-slate-400">{t.txid}</span></p>
          <button onClick={()=>onUser(t.user)} className="text-xs text-brand hover:underline truncate block max-w-full">{t.user}</button>
          <p className="text-[11px] text-slate-400">{t.date}</p>
          {t.note && <p className="text-[11px] text-slate-500 dark:text-slate-300 truncate">💳 {t.note}</p>}
        </div>
        <div className="text-right shrink-0">
          <p className="font-bold text-navy-700 dark:text-white">{cedi0(t.amount)}</p>
          <StatusPill status={t.status}/>
        </div>
      </div>
      {t.status==='Pending' && (
        <div className="flex gap-2 mt-3">
          <Button size="sm" variant="success" className="flex-1" onClick={()=>onApprove(t)}>Approve</Button>
          <Button size="sm" variant="danger" className="flex-1" onClick={()=>onReject(t)}>Reject</Button>
        </div>
      )}
    </Card>
  );
}
function AdminSubCard({ s, onUser, onCancel }){
  const pctNum = Math.min(100, Math.round((s.dayOf / s.days) * 100));
  const bar = { width: pctNum + '%' };
  return (
    <Card className="p-3">
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <p className="font-semibold text-navy-700 dark:text-white">{s.name}</p>
          <button onClick={()=>onUser(s.user)} className="text-xs text-brand hover:underline truncate block max-w-full">{s.user}</button>
        </div>
        {s.status==='active' ? <Badge tone="profit">active</Badge> : <Badge>{s.status}</Badge>}
      </div>
      <div className="flex justify-between text-xs text-slate-500 dark:text-slate-400 mt-2"><span>Price {cedi0(s.price)}</span><span className="text-profit font-semibold">+{cedi0(s.daily)}/day</span></div>
      <div className="mt-2">
        <div className="flex justify-between text-[11px] text-slate-400 mb-1"><span>{s.dayOf}/{s.days} days</span><span>{pctNum}%</span></div>
        <div className="h-1.5 rounded-full bg-slate-200 dark:bg-white/10 overflow-hidden"><div className="h-full bg-brand rounded-full" style={bar}/></div>
      </div>
      {s.status==='active' && <Button size="sm" variant="danger" className="w-full mt-3" onClick={()=>onCancel(s)}>Cancel plan</Button>}
    </Card>
  );
}
function LogCard({ l, onUser }){

      <div className="flex items-center gap-2">

function Admin(){
  const { dark, setDark } = useApp();
  const [me,setMe]     = useState(undefined);   // undefined=loading · null=denied · object=admin
  const [demo,setDemo] = useState(false);
  const [tab,setTab]   = useState('overview');
  const [q,setQ]       = useState('');
  const [txFilter,setTxFilter] = useState('All');
  const [sel,setSel]   = useState(null);        // selected user for the detail drawer
  const [stats,setStats] = useState(null);
  const [users,setUsers] = useState(null);
  const [txns,setTxns]   = useState(null);
  const [subs,setSubs]   = useState(null);
  const [logs,setLogs]   = useState(null);
  const [refs,setRefs]   = useState(null);
  const [refreshing,setRefreshing] = useState(false);   // drives the Refresh button feedback

  async function reloadAll(){
    setRefreshing(true);
    try {
      const r = await Promise.all([api.adminStats(), api.adminUsers(), api.adminTransactions(), api.adminSubscriptions(), api.adminLogs(), api.adminReferrals()]);
      setStats(r[0]); setUsers(r[1]); setTxns(r[2]); setSubs(r[3]); setLogs(r[4]); setRefs(r[5]);
      // keep the open drawer in sync with refreshed data
      setSel(function(prev){ return prev ? (r[1].find(function(x){ return x.id===prev.id; }) || prev) : prev; });
    } finally {
      setRefreshing(false);
    }
  }
  useEffect(function(){
    api.getProfile().then(function(u){
      if(u && u.role === 'admin'){ setMe(u); reloadAll(); }
      else if(DEMO_MODE){ setDemo(true); setMe(ADMIN_DEMO.me); reloadAll(); }
      else setMe(null);
    }).catch(function(){ setMe(null); });
  }, []);

  // ----- linking helpers: resolve a user from any email/name reference -----
  function openUser(u){ setSel(u); }
  function openByRef(ref){
    const list = users || [];
    const u = list.find(function(x){ return x.email===ref || x.name===ref; });
    setSel(u || { id:'_'+ref, name:ref, email:ref, role:'user', tier:'—', balance:0, available:0, _partial:true });
  }

  // ----- action handlers (window prompts keep the demo dependency-free) -----
  async function adjust(u){
    const v = window.prompt('Adjust wallet for ' + u.email + '\nEnter a positive number to CREDIT or a negative number to DEBIT:');
    if(v === null) return;
    const amt = Number(v);
    if(!amt){ window.alert('Please enter a non-zero number.'); return; }
    const note = window.prompt('Optional note for this adjustment:') || '';
    await api.adminAdjust(u.id, amt, note); reloadAll();
  }
  async function changeRole(u){
    const next = u.role === 'admin' ? 'user' : 'admin';
    if(!window.confirm('Change ' + u.email + ' role to "' + next + '"?')) return;
    await api.adminSetRole(u.id, next); reloadAll();
  }
  async function txStatus(t, status){
    if(!window.confirm(status + ' ' + t.txid + ' (' + t.type + ' ' + cedi0(t.amount) + ')?')) return;
    await api.adminTxStatus(t.id, status); reloadAll();
  }
  async function cancelPlan(s){
    if(!window.confirm('Cancel ' + s.name + ' for ' + s.user + '?')) return;
    await api.adminCancelPlan(s.id); reloadAll();
  }

  // ----- gate states -----
  if(me === undefined){
    return (
      <div className="min-h-screen grid place-items-center bg-slate-50 dark:bg-navy-900">
        <div className="flex items-center gap-2 text-slate-400 text-sm"><span className="w-4 h-4 rounded-full border-2 border-brand border-t-transparent animate-spin"/>Loading admin console…</div>
      </div>
    );
  }
  if(me === null){
    return (
      <div className="min-h-screen grid place-items-center bg-slate-50 dark:bg-navy-900 p-6 text-center">
        <Card className="p-8 max-w-sm">
          <div className="w-12 h-12 rounded-2xl bg-loss-soft text-loss grid place-items-center mx-auto"><Icon d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zM8 11V7a4 4 0 118 0v4"/></div>
          <h3 className="font-bold text-lg text-navy-700 dark:text-white mt-3">Admins only</h3>
          <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">Sign in with an administrator account to open the console.</p>
          <div className="flex gap-2 mt-4"><Button variant="outline" className="flex-1" onClick={()=>go('/dashboard')}>Back to app</Button><Button className="flex-1" onClick={()=>go('/login')}>Sign in</Button></div>
        </Card>
      </div>
    );
  }

  const sectionTitle = (ADMIN_NAV.find(function(n){ return n[0]===tab; }) || ['','Overview'])[1];
  const pending = (txns || []).filter(function(t){ return t.status==='Pending'; });
  const pendingDeposits    = pending.filter(function(t){ return t.type==='Deposit'; });
  const pendingWithdrawals = pending.filter(function(t){ return t.type==='Withdrawal'; });
  const ql = q.toLowerCase();
  const sun  = 'M12 3v2M12 19v2M5 12H3M21 12h-2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4M12 8a4 4 0 100 8 4 4 0 000-8z';
  const moon = 'M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z';
  const showSearch = (tab==='users' || tab==='logs' || tab==='referrals');

  // drawer-linked records for the selected user
  const selRef = sel ? sel.email : null;
  const selTx  = (txns || []).filter(function(t){ return t.user===selRef; });
  const selSub = (subs || []).filter(function(s){ return s.user===selRef; });
  const selLog = (logs || []).filter(function(l){ return l.user===selRef || l.actor===selRef; });

  return (
    <div className="min-h-screen flex bg-slate-50 dark:bg-navy-900 text-navy-800 dark:text-slate-100">
      {/* ---------- Sidebar (desktop) ---------- */}
      <aside className="hidden md:flex md:flex-col w-60 shrink-0 bg-navy-800 text-slate-300 border-r border-white/5">
        <div className="h-16 flex items-center gap-2 px-5 border-b border-white/5">
          <Logo withText={false}/>
          <div className="leading-none"><p className="text-white font-extrabold">Swift</p><p className="text-[10px] uppercase tracking-[0.2em] text-brand mt-1">Admin</p></div>
        </div>
        <nav className="flex-1 p-3 space-y-1">
          {ADMIN_NAV.map(function(n){
            const active = tab===n[0];
            return (
              <button key={n[0]} onClick={()=>setTab(n[0])} className={cx('w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-colors', active?'bg-brand text-white shadow-sm':'text-slate-300 hover:bg-white/5')}>
                <Icon d={n[2]} className="w-4 h-4"/>{n[1]}
                {n[0]==='txns' && pending.length>0 && <span className="ml-auto text-[10px] font-bold bg-loss text-white rounded-full px-1.5 py-0.5">{pending.length}</span>}
              </button>
            );
          })}
        </nav>
        <div className="p-3 border-t border-white/5">
          <div className="flex items-center gap-2 px-2 py-2">
            <span className="w-8 h-8 rounded-full bg-brand text-white grid place-items-center text-xs font-bold shrink-0">{me.avatar || 'AD'}</span>
            <div className="min-w-0"><p className="text-white text-sm font-semibold truncate">{me.name || 'Admin'}</p><p className="text-[11px] text-slate-400 truncate">{me.email || 'admin@swift.io'}</p></div>
          </div>
          <a href="#/dashboard" className="mt-1 flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-slate-300 hover:bg-white/5"><Icon d="M11 17l-5-5 5-5M6 12h12" className="w-4 h-4"/>Back to member app</a>
        </div>
      </aside>

      {/* ---------- Main column ---------- */}
      <div className="flex-1 min-w-0 flex flex-col">
        <header className="sticky top-0 z-30 bg-white/90 dark:bg-navy-800/90 backdrop-blur border-b border-slate-100 dark:border-white/10">
          <div className="h-16 flex items-center gap-3 px-4 md:px-6">
            <span className="md:hidden"><Logo withText={false}/></span>
            <div className="leading-none min-w-0">
              <h1 className="font-extrabold text-navy-700 dark:text-white truncate">{sectionTitle}</h1>
              <p className="hidden md:block text-xs text-slate-400 mt-1">Swift Investments · Administration</p>
            </div>
            <div className="ml-auto flex items-center gap-1.5">
              <Button size="sm" variant="outline" disabled={refreshing} onClick={reloadAll}><Icon d="M4 12a8 8 0 0114-5.3L20 8M20 4v4h-4M20 12a8 8 0 01-14 5.3L4 16M4 20v-4h4" className={cx('w-4 h-4', refreshing && 'animate-spin')}/><span className="hidden sm:inline">{refreshing?'Refreshing…':'Refresh'}</span></Button>
              <Button size="sm" variant="ghost" onClick={()=>setDark(!dark)}><Icon d={dark?sun:moon} className="w-4 h-4"/></Button>
              <a href="#/dashboard" className="md:hidden text-sm font-semibold text-brand px-1">Exit</a>
            </div>
          </div>
          {/* mobile section nav */}
          <div className="md:hidden flex gap-1 px-3 pb-2 overflow-x-auto no-scrollbar">
            {ADMIN_NAV.map(function(n){
              return (
                <button key={n[0]} onClick={()=>setTab(n[0])} className={cx('shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold', tab===n[0]?'bg-brand text-white':'bg-slate-100 dark:bg-white/10 text-slate-500 dark:text-slate-300')}>
                  {n[1]}
                  {n[0]==='txns' && pending.length>0 && <span className="text-[9px] font-bold bg-loss text-white rounded-full px-1.5">{pending.length}</span>}
                </button>
              );
            })}
          </div>
          {/* contextual search (users / logs) */}
          {showSearch && (
            <div className="px-3 md:px-6 pb-2">
              <div className="relative">
                <Icon d="M21 21l-4.3-4.3M11 18a7 7 0 100-14 7 7 0 000 14z" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder={tab==='users'?'Search users by name or email…':tab==='referrals'?'Search referrers by name, email or code…':'Search the activity log…'} className="w-full pl-9 pr-3 py-2 text-sm rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-navy-900 focus:ring-2 focus:ring-brand/40 outline-none"/>
              </div>
            </div>
          )}
        </header>

        {demo && (
          <div className="bg-gold-soft text-amber-700 text-xs font-medium px-4 md:px-6 py-2 border-b border-amber-200/60">Preview mode — showing sample data. Deploy the backend and sign in as admin@swift.io to manage live records.</div>
        )}

        <main className="flex-1 p-4 md:p-6 space-y-5 pb-24">

          {tab==='overview' && (!stats ? <TableSkeleton rows={4}/> : (

              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">

                <AdKpi label="Invested"       value={cedi0(stats.totalInvested)}  icon="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z" tone="brand"  onClick={()=>setTab('plans')}/>
                <AdKpi label="Available"      value={cedi0(stats.totalAvailable)} icon="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" tone="amber"/>
              </div>
              <div className="grid grid-cols-2 lg:grid-cols-3 gap-3">
                <AdKpi label="Pending withdrawals" value={stats.pendingWithdrawals} sub="Tap to review"  icon="M12 19V5M5 12l7-7 7 7" tone="loss"  onClick={()=>{ setTab('txns'); setTxFilter('Pending'); }}/>
                <AdKpi label="Pending deposits"    value={stats.pendingDeposits}    sub="Tap to review"  icon="M12 5v14M5 12h14" tone="amber" onClick={()=>{ setTab('txns'); setTxFilter('Pending'); }}/>
                <AdKpi label="Active plans"        value={stats.activePlans}        sub="Currently running" icon="M3 3v18h18M7 14l3-3 3 3 5-5" tone="profit" onClick={()=>setTab('plans')}/>

========================================================================= */
const ROUTES = {
  // Opening the site goes straight to the login page.
  '/':             { comp:Login,        isPublic:true },
  '/welcome':      { comp:Landing,      isPublic:true },   // public marketing page (kept for future use)
  '/login':        { comp:Login,        isPublic:true },
  '/register':     { comp:Register,     isPublic:true },
  '/dashboard':    { comp:Dashboard,    title:'Home' },
  '/plans':        { comp:Plans,        title:'Plans' },

  '/payment':      { comp:Payment,      title:'Payment' },
  '/withdraw':     { comp:Withdraw,     title:'Withdraw' },
  '/transactions': { comp:Transactions, title:'Transactions' },
  '/referrals':    { comp:Referrals,    title:'Referrals' },
  '/account':      { comp:Account,      title:'Account' },

/* Brief full-screen splash shown while the session probe resolves or a redirect
   is in flight, so protected content never flashes for a signed-out visitor. */
function AuthSplash(){
  return (
    <div className="min-h-screen grid place-items-center bg-slate-50 dark:bg-navy-900">
      <div className="flex flex-col items-center gap-3">
        <Logo/>
        <div className="w-6 h-6 rounded-full border-2 border-slate-300 border-t-brand animate-spin"/>
      </div>
    </div>
  );
}
function Router(){
  const route = useHashRoute();
  const { authed, authReady } = useApp();
  const key = Object.keys(ROUTES).find(function(k){ return k!=='/' && route.startsWith(k); }) || (route==='/'?'/':null);
  const match = key ? ROUTES[key] : null;
  const isPublic = match ? !!match.isPublic : true;
  const onAuthScreen = (route === '/' || route.indexOf('/login') === 0 || route.indexOf('/register') === 0);
  // Guard: signed-in users skip the auth screens; guests can't open private pages.
  useEffect(function(){
    if(!authReady) return;
    if(authed && onAuthScreen){ go('/dashboard'); }
    else if(!authed && match && !isPublic){ go('/login'); }
  }, [route, authed, authReady, isPublic, onAuthScreen, match]);
  if(!authReady) return <AuthSplash/>;
  if(!match){
    return <div className="max-w-md mx-auto min-h-screen grid place-items-center text-center p-6"><div><p className="text-6xl font-extrabold text-navy-200">404</p><p className="mt-2 text-slate-500">Page not found.</p><Button className="mt-4 w-auto px-6" onClick={()=>go(authed?'/dashboard':'/login')}>Go home</Button></div></div>;
  }
  if((authed && onAuthScreen) || (!authed && !isPublic)) return <AuthSplash/>;   // brief hold while the effect redirects
  const Comp = match.comp;
  if(match.isPublic) return <Comp/>;
  return <AppShell route={route} title={match.title}><Comp/></AppShell>;
}
/* Error boundary: a render error shows a friendly screen instead of a blank page. */
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error){ return { error: error }; }
  componentDidCatch(error, info){ console.error('[Swift] UI error:', error, info); }
  render(){
    if(this.state.error){
      const self = this;
      return (
        <div className="min-h-screen grid place-items-center bg-slate-50 dark:bg-navy-900 p-6 text-center">
          <div className="max-w-sm">
            <div className="text-4xl">⚠️</div>
            <h2 className="text-lg font-bold text-navy-700 dark:text-white mt-2">Something went wrong</h2>
            <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">This screen hit an unexpected error. Reload, or head back to your dashboard.</p>
            <div className="flex gap-2 justify-center mt-4">
              <button onClick={function(){ self.setState({ error:null }); go('/dashboard'); }} className="px-4 py-2 rounded-xl bg-brand text-white text-sm font-semibold">Go to dashboard</button>
              <button onClick={function(){ location.reload(); }} className="px-4 py-2 rounded-xl border border-slate-200 dark:border-white/10 text-sm font-semibold">Reload</button>
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
function App(){ return <ErrorBoundary><AppProvider><Router/></AppProvider></ErrorBoundary>; }
try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(err){
  if(typeof swiftShowError==='function') swiftShowError('The app failed to start', (err && err.message) || String(err));
}
</script>
</body>
</html>
